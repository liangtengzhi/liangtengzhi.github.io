<html>
<head>
	<meta charset="UTF-8" />

    <link rel="icon" type="image/svg+xml" href="../PNG/zhou_zen.ico">

            <div class="nav-brand">

    <div class="main-content" role="main">
        <div class="container">
            <div class="form-container">
                <h2>留言板 <small>也算作聊天板喵?</small></h2>
                <table>
                    <tr>
                        <td><label for="memo">留言</label></td>
                        <td><textarea name="memo" id="memo" cols="50" rows="5" placeholder="说点什么吧…"></textarea></td>
                    </tr>
                    <tr>
                        <td colspan="2"><input type="button" value="提交留言" onclick="saveData()" /></td>
                    </tr>
                </table>
            </div>
            <div class="table-wrapper">
                <table id="datatable"></table>
                <p id="msg"></p>
            </div>
        </div>
